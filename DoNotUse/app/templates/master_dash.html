<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTTC | Master Trainer Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
// Apply theme + role before render to avoid flash
(function(){
  var t = localStorage.getItem('gttc_theme') || 'light';
  document.documentElement.dataset.theme = t;
  document.documentElement.dataset.role  = 'master_trainer';
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="stylesheet" href="/static/css/portal-theme.css?v=16">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --blue:     #2563eb;
  --blue-dk:  #1d4ed8;
  --blue-lt:  #eff6ff;
  --blue-50:  #dbeafe;
  --indigo:   #4f46e5;
  --teal:     #0d9488;
  --violet:   #7c3aed;
  --amber:    #d97706;
  --green:    #16a34a;
  --red:      #dc2626;
  --orange:   #ea580c;
  --rust:     #c26840;
  --rust-lt:  rgba(149,76,46,.12);
  --green-bg: rgba(22,163,74,.12);
  --amber-bg: rgba(217,119,6,.12);
  --red-bg:   rgba(220,38,38,.12);
  --violet-bg:rgba(124,58,237,.1);

  --bg:      #f0f4fa;
  --surface: #ffffff;
  --border:  #e2e8f0;

  --text:    #0f172a;
  --text2:   #334155;
  --text3:   #64748b;
  --text4:   #94a3b8;
  --r: 10px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 2px 6px rgba(0,0,0,.04);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.07);
  --shadow-md:0 2px 8px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.09);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 24px 64px rgba(0,0,0,.12);
}
/* ════ DARK MODE ════ */
html[data-theme="dark"]{
  /* Surfaces */
  --bg:      #111113;
  --surface: #1c1c1f;
  --border:  #2e2e34;

  /* Text */
  --text:    #f0f0f1;
  --text2:   #c0c0c4;
  --text3:   #7a7a82;
  --text4:   #57595B;

  /* Rust replaces blue as primary accent in dark mode */
  --blue:     #954C2E;
  --blue-dk:  #b85c38;
  --blue-lt:  rgba(149,76,46,.18);
  --blue-50:  rgba(149,76,46,.28);
  --rust:     #954C2E;
  --rust-lt:  rgba(149,76,46,.2);

  /* Accent palette — brightened for dark bg */
  --indigo:   #818cf8;
  --teal:     #2dd4bf;
  --violet:   #c084fc;
  --amber:    #fbbf24;
  --green:    #4ade80;
  --red:      #f87171;
  --orange:   #fb923c;
}

/* Sidebar → rust gradient */
html[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#6b3520 0%,#4a2416 60%,#2d1509 100%) !important}
/* Login left panel → rust gradient */
html[data-theme="dark"] .login-left{background:linear-gradient(145deg,#3d1e10 0%,#6b3520 45%,#4a2416 100%) !important}
/* Nav active → rust highlight */
html[data-theme="dark"] .nav-item.active{background:rgba(149,76,46,.25) !important;color:#e8a07a !important;font-weight:700}
html[data-theme="dark"] .nav-item:hover{background:rgba(255,255,255,.07) !important;color:#fff !important}
/* Topbar & login right */
html[data-theme="dark"] .topbar{background:var(--surface);box-shadow:0 1px 0 var(--border)}
html[data-theme="dark"] .login-right{background:var(--surface)}
/* Primary button → rust */
html[data-theme="dark"] .btn-primary{background:#954C2E !important;border-color:#954C2E !important;color:#fff !important}
html[data-theme="dark"] .btn-primary:hover{background:#b85c38 !important;border-color:#b85c38 !important}
/* Focus rings → rust */
html[data-theme="dark"] .form-group input:focus{border-color:#954C2E !important;box-shadow:0 0 0 3px rgba(149,76,46,.2) !important}

/* Form inputs */
html[data-theme="dark"] .form-group input{background-color:var(--bg);border-color:var(--border);color:var(--text)}
html[data-theme="dark"] .search-box input{background-color:var(--bg);border-color:var(--border);color:var(--text)}
html[data-theme="dark"] .search-box input:focus{background-color:var(--surface)}



/* KPI cards — rust / blue / charcoal / indigo / orange palette */
html[data-theme="dark"] .kpi-card:nth-child(1){background:linear-gradient(135deg,rgba(37,99,235,.18),rgba(37,99,235,.08));border-color:rgba(37,99,235,.3)}
html[data-theme="dark"] .kpi-card:nth-child(2){background:linear-gradient(135deg,rgba(149,76,46,.2),rgba(149,76,46,.1));border-color:rgba(149,76,46,.35)}
html[data-theme="dark"] .kpi-card:nth-child(3){background:linear-gradient(135deg,rgba(87,89,91,.22),rgba(87,89,91,.1));border-color:rgba(87,89,91,.35)}
html[data-theme="dark"] .kpi-card:nth-child(4){background:linear-gradient(135deg,rgba(129,140,248,.16),rgba(129,140,248,.07));border-color:rgba(129,140,248,.28)}
html[data-theme="dark"] .kpi-card:nth-child(5){background:linear-gradient(135deg,rgba(251,146,60,.14),rgba(251,146,60,.07));border-color:rgba(251,146,60,.28)}
html[data-theme="dark"] .kpi-card .icon{background:rgba(255,255,255,.08)}
html[data-theme="dark"] .kpi-card .value{color:var(--text)}
html[data-theme="dark"] .kpi-card:nth-child(2) .icon{color:var(--rust)}


/* Period selector */
html[data-theme="dark"] .period-btn{background:var(--surface);border-color:var(--border);color:var(--text3)}
html[data-theme="dark"] .period-btn.active{background:var(--rust);border-color:var(--rust);color:#fff}
html[data-theme="dark"] .period-btn:hover:not(.active){background:var(--bg);color:var(--text2)}


/* Modals */
html[data-theme="dark"] .modal-bg .modal-box,
html[data-theme="dark"] .modal{background:var(--surface);border:1px solid var(--border)}
html[data-theme="dark"] .modal-box select,
html[data-theme="dark"] .modal-box input,
html[data-theme="dark"] .modal-box textarea{background:var(--bg);border-color:var(--border);color:var(--text)}

/* Inline-style overrides (can't reach without !important) */
html[data-theme="dark"] #editReportInfo{background:var(--bg)!important;color:var(--text2)!important}
html[data-theme="dark"] [style*="background:#f8fafc"]{background:var(--bg)!important;color:var(--text2)!important}
html[data-theme="dark"] select{background-color:var(--bg);border-color:var(--border);color:var(--text);background-repeat:no-repeat;background-position:right 8px center}
html[data-theme="dark"] input:not([type="submit"]):not([type="button"]){background-color:var(--bg);border-color:var(--border);color:var(--text)}

/* Topbar date text */
html[data-theme="dark"] #topbarDate{color:var(--text3)!important}

/* Table-header inner border */
html[data-theme="dark"] .table-header{border-bottom-color:var(--border)}


body{
  font-family:'Figtree',sans-serif;
  font-variant-numeric:lining-nums tabular-nums;
  background:var(--bg);color:var(--text2);
  font-size:16px;line-height:1.65;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background-color .25s,color .25s;
}

/* ════ LOGIN ════ */
#loginScreen{
  display:flex;align-items:stretch;min-height:100vh;
}
.login-left{
  flex:1;
  background:linear-gradient(145deg,#1e3a8a 0%,#1d4ed8 40%,#4338ca 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 48px;color:#fff;
  position:relative;overflow:hidden;
}
.login-left-logo{
  width:64px;height:64px;background:rgba(255,255,255,.15);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin-bottom:28px;border:2px solid rgba(255,255,255,.2);
  backdrop-filter:blur(4px);
}
.login-left h1{font-size:2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
.login-left p{font-size:.95rem;opacity:.75;max-width:320px;text-align:center;line-height:1.7}
.login-left .badges{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.login-left .badge-pill{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:.75rem;font-weight:600;padding:6px 16px;border-radius:20px;
}
.login-right{
  width:480px;background:var(--surface);display:flex;align-items:center;justify-content:center;
  padding:60px 52px;transition:background-color .25s;
}
.login-form-wrap{width:100%;max-width:360px}
.login-form-wrap h2{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.3px}
.login-form-wrap p{color:var(--text3);font-size:.88rem;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:var(--r);font-size:.92rem;font-family:'Figtree',sans-serif;
  color:var(--text);transition:.15s;
}
.form-group input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.form-group input::placeholder{color:var(--text4)}
.login-badge{display:none}
.login-logo{display:none}
.login-card{background:none;box-shadow:none;padding:0;border-radius:0;border:none;max-width:none;width:100%}

/* ════ BUTTONS ════ */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border:1.5px solid transparent;border-radius:var(--r);
  font-size:.92rem;font-weight:600;cursor:pointer;transition:all .15s;
  font-family:'Figtree',sans-serif;white-space:nowrap;text-decoration:none;
  box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--blue-dk);box-shadow:0 4px 16px rgba(37,99,235,.35)}
.btn-block{width:100%;justify-content:center;padding:12px;font-size:.9rem}
.btn-sm{padding:5px 12px;font-size:.78rem;border-radius:6px}
.btn-xs{padding:3px 9px;font-size:.72rem;border-radius:5px}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warn{background:var(--amber);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text3);border-color:var(--border);box-shadow:none}
.btn-ghost:hover{background:var(--bg);color:var(--text2);box-shadow:none}
.btn-outline{background:transparent;color:var(--blue);border-color:var(--blue)}
.btn-outline:hover{background:var(--blue-lt)}

/* ════ APP SHELL ════ */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}

/* ════ SIDEBAR ════ */
.sidebar{
  width:256px;flex-shrink:0;overflow-y:auto;
  background:linear-gradient(180deg,#1e40af 0%,#1e3a8a 60%,#1e3060 100%);
  display:flex;flex-direction:column;
  box-shadow:2px 0 16px rgba(0,0,0,.18);
}
.sidebar-brand{
  padding:22px 20px 18px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar-brand h2{
  color:#fff;font-size:.95rem;font-weight:800;
  display:flex;align-items:center;gap:10px;letter-spacing:-.1px;
}
.sidebar-brand h2 .brand-icon{
  width:32px;height:32px;background:rgba(255,255,255,.15);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;border:1px solid rgba(255,255,255,.2);
}
.sidebar-brand p{color:rgba(255,255,255,.5);font-size:.7rem;margin-top:4px;padding-left:42px}
.div-badge{
  margin-top:10px;background:rgba(255,255,255,.12);color:#bfdbfe;
  font-size:.67rem;font-weight:700;padding:4px 10px;border-radius:20px;
  display:inline-block;letter-spacing:.5px;border:1px solid rgba(255,255,255,.15);
}
.nav-section{padding:12px 10px 4px}
.nav-label{
  padding:8px 10px 5px;font-size:.72rem;font-weight:700;
  color:rgba(255,255,255,.55);letter-spacing:1.2px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;margin:2px 0;
  color:#FFF6F6;cursor:pointer;
  transition:all .15s cubic-bezier(.4,0,.2,1);font-size:.98rem;font-weight:500;border-radius:8px;
}
.nav-item:hover{background:rgba(255,255,255,.12);color:#fff;padding-left:15px}
.nav-item.active{background:rgba(255,255,255,.22);color:#fff;font-weight:700;box-shadow:inset 3px 0 0 #fff,0 2px 8px rgba(0,0,0,.15)}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-item i{font-size:16px;flex-shrink:0;width:17px;text-align:center}
.sidebar-footer{
  margin-top:auto;padding:16px 20px;
  border-top:1px solid rgba(255,255,255,.1);
}
.sidebar-user{display:flex;align-items:center;gap:10px}
.sidebar-avatar{
  width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:.82rem;flex-shrink:0;
  border:1px solid rgba(255,255,255,.25);
}
.sidebar-user-info p{color:#fff;font-size:.8rem;font-weight:600}
.sidebar-user-info span{color:rgba(255,255,255,.5);font-size:.69rem}
.logout-btn{
  margin-top:10px;width:100%;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.15);
  padding:8px;border-radius:7px;cursor:pointer;
  font-size:.78rem;font-weight:600;transition:.15s;font-family:'Figtree',sans-serif;
}
.logout-btn:hover{background:rgba(220,38,38,.25);color:#fca5a5;border-color:rgba(220,38,38,.3)}

/* ════ MAIN ════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  background:var(--surface);padding:0 26px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.topbar-title{font-size:1.15rem;font-weight:800;color:var(--text);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.page-content{flex:1;overflow-y:auto;padding:24px}

/* ════ STAT CARDS (matches admin dash) ════ */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g4{grid-template-columns:1fr}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px 20px;position:relative;overflow:hidden;transition:all .2s;box-shadow:var(--shadow);min-height:140px}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--text3)}
.stat-accent{position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 12px 0 80px;opacity:.13}
.stat-label{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-val{font-size:38px;font-weight:800;line-height:1;letter-spacing:-1.5px;color:var(--text);font-family:'Figtree',sans-serif}
.stat-sub{font-size:13px;color:var(--text);margin-top:8px;font-weight:500;opacity:.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* kpi-card — used on Reports, Analytics, Schools pages */
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;transition:all .2s;box-shadow:var(--shadow)}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-card .icon{font-size:18px;margin-bottom:8px;opacity:.7}
.kpi-card .label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);opacity:.65;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-card .value{font-size:34px;font-weight:800;line-height:1;letter-spacing:-1px;color:var(--text);font-family:'Figtree',sans-serif}
/* kpi-grid alias */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}

/* ════ CHART CARDS ════ */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border-radius:14px;padding:22px;border:1px solid var(--border);box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s}
.chart-card:hover{box-shadow:var(--shadow-md)}
.chart-card h3{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:16px;letter-spacing:-.2px}
.chart-wrap{position:relative;height:220px}

/* ════ GENERIC CARD ════ */
.card{background:var(--surface);border-radius:14px;padding:22px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;transition:box-shadow .2s}

/* ════ TABLE CARD ════ */
.table-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;transition:box-shadow .2s}
.table-card:hover{box-shadow:var(--shadow-md)}
.table-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.table-header h3{font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:-.2px}
.search-box{position:relative}
.search-box input{
  padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.82rem;width:210px;font-family:'Figtree',sans-serif;
  color:var(--text);background:var(--bg);transition:all .15s;
}
.search-box input:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.12);width:240px}
.search-box input::placeholder{color:var(--text4)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text4)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:13px 18px;font-size:.82rem;font-weight:800;text-align:left;color:var(--text);opacity:.55;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:14px 18px;font-size:.98rem;color:var(--text);border-bottom:1px solid var(--border);font-weight:500;transition:background .1s}
tr:last-child td{border-bottom:none}
tbody tr{transition:all .12s}
tbody tr:hover td{background:rgba(37,99,235,.06)}
tbody tr:hover td:first-child{border-left:3px solid var(--blue);padding-left:13px}
tfoot td{background:var(--bg);font-weight:700;color:var(--text);border-top:2px solid var(--border)}

/* ════ BADGES ════ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:.75rem;font-weight:700;letter-spacing:.1px}
.badge-success,.badge-green{background:var(--green-bg,rgba(22,163,74,.12));color:var(--green)}
.badge-warn,.badge-amber{background:var(--amber-bg,rgba(217,119,6,.12));color:var(--amber)}
.badge-danger,.badge-red{background:var(--red-bg,rgba(220,38,38,.12));color:var(--red)}
.badge-info,.badge-blue{background:var(--blue-lt);color:var(--blue)}
.badge-gray{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.badge-purple{background:var(--violet-bg,rgba(124,58,237,.1));color:var(--violet)}
.badge-teal{background:rgba(13,148,136,.10);color:var(--teal)}

/* ════ PERIOD SELECTOR ════ */
.period-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.period-bar label{font-size:.78rem;font-weight:700;color:var(--text3);margin-right:4px}
.period-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-size:.78rem;font-weight:600;color:var(--text3);cursor:pointer;transition:.15s;font-family:'Figtree',sans-serif}
.period-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.period-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.3)}

/* ════ FILTERS ════ */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-row select,.filter-select{padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--text2);background:var(--surface);cursor:pointer;font-family:'Figtree',sans-serif;transition:.15s;outline:none}
.filter-row select:focus,.filter-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ════ MODAL ════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:.96rem;font-weight:700;color:var(--text);letter-spacing:-.1px}
.modal-close{background:none;border:none;color:var(--text4);cursor:pointer;padding:5px 7px;border-radius:6px;transition:.15s;line-height:1;font-size:1.25rem}
.modal-close:hover{background:#f1f5f9;color:var(--text2)}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px;background:#fafbfd;border-radius:0 0 16px 16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.79rem;font-weight:600;color:var(--text);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:.86rem;color:var(--text);background:var(--surface);font-family:'Figtree',sans-serif;transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg input::placeholder{color:var(--text4)}
.fg textarea{resize:vertical;min-height:80px}

/* ════ PROGRESS BARS ════ */
.progress-list{display:flex;flex-direction:column;gap:12px}
.progress-item label{font-size:.8rem;color:var(--text2);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between}
.progress-bar-bg{height:8px;background:#e9edf5;border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:4px;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* ════ TOAST ════ */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:10px;font-size:.84rem;font-weight:600;color:#fff;box-shadow:var(--shadow-md);animation:slideIn .25s ease;display:flex;align-items:center;gap:8px}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.toast-success{background:#16a34a}
.toast-error{background:#dc2626}
.toast-info{background:#2563eb}
.toast-warn{background:#d97706}

/* ── SPINNING GEARS ── */
.cubes-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.login-left>*:not(.cubes-bg){position:relative;z-index:1}
.gear-wrap{position:absolute;transform-origin:center center}
@keyframes spinGear{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes spinGearRev{to{transform:translate(-50%,-50%) rotate(-360deg)}}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ── PAGE ENTER ── */
.page-content>*{animation:fadeIn .22s ease}

/* ════ SKELETON ════ */
.skeleton{background:linear-gradient(90deg,var(--ink,#edf0f7) 25%,var(--border,#e4e9f3) 50%,var(--ink,#edf0f7) 75%);background-size:400px 100%;animation:shimmer 1.3s ease-in-out infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel-row{height:42px;margin-bottom:4px}

/* ════ EMPTY STATE ════ */
.empty-state{text-align:center;padding:56px 20px;color:var(--text4)}
.empty-state svg{width:48px;height:48px;margin:0 auto 14px;opacity:.3}
.empty-state i{font-size:2.4rem;margin-bottom:14px;display:block;opacity:.3}
.empty-state p{font-size:.88rem;color:var(--text3)}

/* ════ PAGE HEADER (matches admin dash) ════ */
.page-hdr{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.page-hdr h1{font-size:32px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.page-hdr p{font-size:15px;color:var(--text);margin-top:6px;font-weight:500;opacity:.6}

/* ════ SECTION LABEL (matches admin dash) ════ */
.sec-label{font-size:11px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:8px;opacity:.6;padding-bottom:10px;border-bottom:2px solid var(--border)}

/* ════ HELPERS ════ */
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:900px){.section-grid{grid-template-columns:1fr}}
.flex{display:flex}.gap-2{gap:8px}.ml-auto{margin-left:auto}
/* ── Polish additions ── */
.card{transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.tbl tbody tr:nth-child(even),.table-card table tbody tr:nth-child(even) td{background:var(--ink3,rgba(248,250,252,.5))}
.trend-up{color:var(--green,#16a34a);font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.trend-dn{color:var(--red,#dc2626);font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.trend-flat{color:var(--text3);font-size:11px;font-weight:600}

const MONTHS = ['','January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const PERIODS = [1,2,3,6,8,10,12];

function getLastNMonths(n, anchor) {
  const result = [];
  const now = anchor || new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    result.push({ year: d.getFullYear(), month: d.getMonth() + 1 });
  }
  return result;
}
// Anchor trend windows to the most recent month that actually has data, so the
// charts aren't empty when viewing a past academic year.
function _anchorFromReports(rows){
  if (rows && rows.length){
    let best = rows[0];
    for (const r of rows) if ((r.report_year*12+r.report_month) > (best.report_year*12+best.report_month)) best = r;
    return new Date(best.report_year, best.report_month - 1, 1);
  }
  return new Date();
}
// The 12 months of the Indian academic year (June → May) covering the data.
function academicMonths(rows){
  let startYear;
  if (rows && rows.length){
    let best = rows[0];
    for (const r of rows) if ((r.report_year*12+r.report_month) > (best.report_year*12+best.report_month)) best = r;
    startYear = best.report_month >= 6 ? best.report_year : best.report_year - 1;
  } else {
    const now = new Date();
    startYear = (now.getMonth()+1) >= 6 ? now.getFullYear() : now.getFullYear()-1;
  }
  const out = [];
  for (let m=6; m<=12; m++) out.push({year:startYear,   month:m});
  for (let m=1; m<=5;  m++) out.push({year:startYear+1, month:m});
  return out;
}

// ══════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════
async function api(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (STATE.token) headers['Authorization'] = 'Bearer ' + STATE.token;
  const res = await fetch(url, { ...opts, headers });
  if (res.status === 401) { doLogout(); throw new Error('Unauthorised'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Utility: count-up animation ──────────────────────────────
function countUp(el, target, duration = 650) {
  if (!el || isNaN(target)) return;
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target).toLocaleString('en-IN');
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target.toLocaleString('en-IN');
  };
  requestAnimationFrame(step);
}

// ── Utility: trend pill ──────────────────────────────────────
function trendPill(current, prev) {
  if (prev === null || prev === undefined) return '';
  const delta = current - prev;
  if (prev === 0) return delta > 0 ? `<span class="trend-up">▲ New</span>` : '';
  const pct = Math.abs(Math.round((delta / prev) * 100));
  if (delta > 0) return `<span class="trend-up">▲ ${pct}%</span>`;
  if (delta < 0) return `<span class="trend-dn">▼ ${pct}%</span>`;
  return `<span class="trend-flat">→ same</span>`;
}

// ── Utility: SVG ring progress ───────────────────────────────
function mkRing(pct, labelTop, labelBot, color='var(--blue,#2563eb)') {
  const r = 38, circ = 2 * Math.PI * r;
  const dash = circ * Math.min(Math.max(pct, 0), 1);
  return `<svg viewBox="0 0 100 100" style="width:110px;height:110px">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--border,#e2e8f0)" stroke-width="9"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="9"
      stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 50 50)" style="transition:stroke-dasharray .8s ease"/>
    <text x="50" y="46" text-anchor="middle" font-size="15" font-weight="800" fill="var(--text,#0f172a)">${labelTop}</text>
    <text x="50" y="60" text-anchor="middle" font-size="8" fill="var(--text3,#94a3b8)">${labelBot}</text>
  </svg>`;
}

function mtFilterGallery(btn,cat){ document.querySelectorAll('.gfilter').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); mtLoadGallery(cat); }
function mtGalleryCard(g){

async function loadDashboard() {
  try {
    const [reports, schools] = await Promise.all([
      api('/api/reports?limit=500'),
      api('/api/admin/schools?limit=200'),
    ]);
    STATE._allReports = reports;
    STATE._allSchools = schools.filter(s => s.division_id === STATE.me.division_id);
    STATE._allSubs = [];

    // KPI totals (latest month per school)
    const latest = getLatestMonthReports(reports);
    const totalStudents  = latest.reduce((a,r) => a + (r.students_school||0) + (r.students_community||0), 0);
    const totalWorkshops = latest.reduce((a,r) => a + (r.workshops_count||0), 0);
    const totalMentoring = latest.reduce((a,r) => a + (r.mentoring_sessions||0), 0);
    const totalProjects  = latest.reduce((a,r) => a + (r.innovation_projects||0), 0);
    const totalWon       = latest.reduce((a,r) => a + (r.total_won||0), 0);
    const atlPart        = latest.reduce((a,r) => a + (r.atl_competitions_participated||0), 0);
    const indVisits      = latest.reduce((a,r) => a + (r.industrial_visits||0), 0);

    const fmt = n => n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'K' : String(n);

    loadStdKpis();   // standard 12 KPI cards (role-scoped via /api/analytics/kpis)

    // Submission rate ring
    const now2 = new Date();
    const curM = now2.getMonth() + 1, curY = now2.getFullYear();
    const submittedThisMonth = new Set(
      reports.filter(r => r.report_year === curY && r.report_month === curM && r.status === 'submitted').map(r => r.school_id)
    );
    const totalSch = STATE._allSchools.length;
    const submittedCount = submittedThisMonth.size;
    const rate = totalSch > 0 ? submittedCount / totalSch : 0;
    const MABB2 = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const ringEl = document.getElementById('mt-rate-ring');
    if (ringEl) ringEl.innerHTML = mkRing(rate, `${Math.round(rate*100)}%`, 'submitted', '#2563eb');
    const rateLbl = document.getElementById('mt-rate-label');
    if (rateLbl) rateLbl.textContent = `${submittedCount} of ${totalSch} schools`;
    const rateSub = document.getElementById('mt-rate-sub');
    if (rateSub) rateSub.textContent = `Submitted for ${MABB2[curM]} ${curY}`;

    // Pending banner
    const pending = totalSch - submittedCount;
    const bannerEl = document.getElementById('mt-pending-banner');
    const textEl   = document.getElementById('mt-pending-text');
    if (pending > 0 && bannerEl && textEl) {
      bannerEl.style.display = 'flex';
      textEl.textContent = `${pending} school${pending > 1 ? 's haven\'t' : ' hasn\'t'} submitted a report for ${MABB2[curM]} ${curY}`;
    } else if (bannerEl) {
      bannerEl.style.display = 'none';
    }

    const scopeEl = document.getElementById('dash-scope');
    if (scopeEl) scopeEl.textContent = `Showing latest report data · ${STATE._allSchools.length} schools`;

    // Trend chart — full academic year (June → May)
    const months6 = academicMonths(reports);
    const trendData = months6.map(({year,month}) => {
      const rs = reports.filter(r => r.report_year === year && r.report_month === month);
      return rs.reduce((a,r) => a + (r.students_school||0) + (r.students_community||0), 0);
    });
    const trendCtx = document.getElementById('dashTrendChart');
    if (trendCtx) {
      STATE._charts.trend = new Chart(trendCtx, {
        type:'line',
        data: {
          labels: months6.map(m => MONTHS[m.month].slice(0,3)+' '+String(m.year).slice(2)),
          datasets: [{ label:'Students', data: trendData, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.1)', tension:.4, fill:true }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
      });
    }

    // Top schools by students
    const topSchools = STATE._allSchools.map(sc => {
      const scLatest = latest.filter(r => r.school_id === sc.id);
      const stu = scLatest.reduce((a,r) => a + (r.students_school||0) + (r.students_community||0), 0);
      return { name: sc.name, students: stu };
    }).sort((a,b) => b.students - a.students).slice(0,6);
    const maxStu = Math.max(...topSchools.map(s => s.students), 1);
    document.getElementById('subPerfList').innerHTML = `<div class="progress-list">${topSchools.map(s => `
      <div class="progress-item">
        <label>${s.name} — ${s.students.toLocaleString()} students</label>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${(s.students/maxStu*100).toFixed(1)}%"></div></div>
      </div>`).join('')}</div>`;

    // Division summary list
    const summaryEl = document.getElementById('dashSummaryList');
    if (summaryEl) {
      const summaryItems = [
        { label:'Total Schools', value: STATE._allSchools.length, icon:'<i class="ti ti-building"></i>' },
        { label:'ATL Labs', value: STATE._allSchools.filter(s=>s.lab_type==='atl').length, icon:'<i class="ti ti-microscope"></i>' },
        { label:'STL Labs', value: STATE._allSchools.filter(s=>s.lab_type==='stl').length, icon:'<i class="ti ti-flask"></i>' },
        { label:'Reports This Month', value: getLatestMonthReports(reports).length, icon:'<i class="ti ti-clipboard-list"></i>' },
      ];
      summaryEl.innerHTML = summaryItems.map(it => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f8fafc">
          <span style="color:#64748b">${it.icon} ${it.label}</span>
          <span style="font-weight:700;color:#1e293b">${it.value}</span>
        </div>`).join('');
    }

    // Schools table
    const schoolRows = STATE._allSchools.slice(0,10).map((sc,i) => {
      const scReports = latest.filter(r => r.school_id === sc.id);
      const stu  = scReports.reduce((a,r) => a+(r.students_school||0)+(r.students_community||0),0);
      const ws   = scReports.reduce((a,r) => a+(r.workshops_count||0),0);
      const ment = scReports.reduce((a,r) => a+(r.mentoring_sessions||0),0);
      const pr   = scReports.reduce((a,r) => a+(r.innovation_projects||0),0);
      const won  = scReports.reduce((a,r) => a+(r.total_won||0),0);
      const vis  = scReports.reduce((a,r) => a+(r.industrial_visits||0),0);
      return `<tr>
        <td>${i+1}</td>
        <td style="font-weight:600">${sc.name}</td>
        <td>${sc.district||'—'}</td>
        <td>${stu.toLocaleString()}</td>
        <td>${ws}</td>
        <td>${ment}</td>
        <td>${pr}</td>
        <td>${won}</td>
        <td>${vis}</td>
      </tr>`;
    }).join('');
    document.getElementById('dashSchoolsTb').innerHTML = schoolRows || '<tr><td colspan="9" style="text-align:center;color:#94a3b8">No data</td></tr>';
  } catch(e) { toast(e.message, 'error'); }
}

    ]);

    STATE._allSchools = schools;
    STATE._allDivisions = divisions || [];

    // populate district dropdown from loaded schools (division filter removed)
    populateMasterDistricts();
  }
}

// Fill the district filter directly from all loaded schools (no division cascade)
function populateMasterDistricts() {
  const distSel = document.getElementById('mt-district');
  if (!distSel || !STATE._allSchools) return;
  const cur = distSel.value;
  const districts = [...new Set(STATE._allSchools.map(s => s.district).filter(Boolean))].sort();
  distSel.innerHTML = '<option value="">All Districts</option>';
  districts.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; distSel.appendChild(o); });
  if (cur) distSel.value = cur;
}


function renderReportSection() {
  if (!STATE._allReports || !STATE._allSchools) return;
  const rows = aggregateReports(STATE._allReports);
  STATE._reportRows = rows;
  drawReportCharts(rows);
  drawReportKpis(rows);
  drawTableRows(rows);
}

function aggregateReports(allReports) {
  let filtered = allReports;

  if (STATE.yearFilter)   filtered = filtered.filter(r => r.academic_year === STATE.yearFilter);
  if (STATE.monthFilter)  filtered = filtered.filter(r => r.report_month === parseInt(STATE.monthFilter));
  if (STATE.statusFilter) filtered = filtered.filter(r => r.status === STATE.statusFilter);

  if (STATE.subFilter) {
    const distSchools = STATE._allSchools.filter(s => s.district === STATE.subFilter).map(s => s.id);
    filtered = filtered.filter(r => distSchools.includes(r.school_id));
  }

  if (STATE.schoolFilter) {
    filtered = filtered.filter(r => r.school_id === parseInt(STATE.schoolFilter));
  }

  return filtered.map(r => {
    const school = STATE._allSchools.find(s => s.id === r.school_id);
    return { ...r, _school: school, _canEdit: true, _monthLabel: MONTHS[r.report_month]+' '+r.report_year };
  });
}

function applyMasterReportFilters() {
  STATE.yearFilter     = document.getElementById('mt-year')?.value     || '';
  STATE.monthFilter    = document.getElementById('mt-month')?.value    || '';
  STATE.statusFilter   = document.getElementById('mt-status')?.value   || '';
  STATE.subFilter      = document.getElementById('mt-district')?.value || '';
  STATE.schoolFilter   = document.getElementById('mt-school')?.value   || '';
  renderReportSection();
}

function clearMasterReportFilters() {
  STATE.yearFilter = STATE.monthFilter = STATE.statusFilter = STATE.subFilter = STATE.schoolFilter = '';
  ['mt-year','mt-month','mt-status'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  populateMasterDistricts();   // restore full district list
  const distSel = document.getElementById('mt-district');
  if (distSel) distSel.value = '';
  const schSel = document.getElementById('mt-school');
  if (schSel) schSel.innerHTML = '<option value="">All Schools</option>';
  renderReportSection();
}

function onMasterDistrictChange() {
  const district = document.getElementById('mt-district')?.value;
  const schSel = document.getElementById('mt-school');
  if (!schSel) return;
  schSel.innerHTML = '<option value="">All Schools</option>';
  if (!district || !STATE._allSchools) return;
  const schools = STATE._allSchools.filter(s => s.district === district).sort((a,b) => a.name.localeCompare(b.name));
  schools.forEach(s => { const o=document.createElement('option'); o.value=s.id; o.textContent=s.name; schSel.appendChild(o); });
}

function drawReportCharts(rows) {
  ['chartStudents','chartWorkshops','chartProjects'].forEach(id => {
    const c = STATE._charts[id];
    if (c) { c.destroy(); delete STATE._charts[id]; }
  });

  const labels = rows.map(r => (r._school||{}).name ? (r._school.name.length>20 ? r._school.name.slice(0,20)+'…' : r._school.name) : `School ${r.school_id}`);
  const colors = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#065f46'];

  const makeBar = (id, data, label, color) => {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    STATE._charts[id] = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label, data, backgroundColor: color+'99', borderColor: color, borderWidth:1, borderRadius:4 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}, x:{ticks:{font:{size:10}}}} }
    });
  };

  makeBar('chartStudents', rows.map(r => (r.students_school||0)+(r.students_community||0)), 'Students', '#2563eb');
  makeBar('chartWorkshops', rows.map(r => r.workshops_count||0), 'Workshops', '#16a34a');
  makeBar('chartProjects', rows.map(r => r.innovation_projects||0), 'Projects', '#d97706');
}

function drawReportKpis(rows) {
  const upd = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = typeof v === 'number' ? v.toLocaleString() : v; };

  // All fields are running YTD totals — use the latest submitted report per school
  const latestPerSchool = {};
  rows.forEach(r => {
    const sid = r.school_id;
    const prev = latestPerSchool[sid];
    if (!prev || r.report_year > prev.report_year || (r.report_year === prev.report_year && r.report_month > prev.report_month)) {
      latestPerSchool[sid] = r;
    }
  });
  const latestRows = Object.values(latestPerSchool);
  const latSum = f => latestRows.reduce((a,r) => a+(r[f]||0), 0);

  upd('kpiStudents', latSum('students_school') + latSum('students_community'));
  upd('kpiGirls',    latSum('students_girls'));
  upd('kpiBoys',     Math.max(0, latSum('students_school') - latSum('students_girls')));
  upd('kpiWorkshops',latSum('workshops_count'));
  upd('kpiProjects', latSum('innovation_projects'));
  upd('kpiWon',      latSum('atl_competitions_won') + latSum('other_competitions_won'));
}

function drawTableRows(rows) {
  const tb = document.getElementById('reportTb');
  if (!tb) return;
  if (!rows.length) { tb.innerHTML = '<tr><td colspan="13" style="text-align:center;color:#94a3b8;padding:32px">No reports for selected period</td></tr>'; return; }

  const numFields = ['students_school','students_community','students_girls','workshops_count',
    'mentoring_sessions','innovation_projects','atl_competitions_won','other_competitions_won'];

  tb.innerHTML = rows.map(r => {
    const school = r._school || {};
    const sub = r._sub || {};
    const status = r.status === 'submitted' ? '<span class="badge badge-success">Submitted</span>'
                 : r.status === 'aggregated' ? '<span class="badge badge-info">Aggregated</span>'
                 : '<span class="badge badge-warn">Draft</span>';
    const editBtn = r._canEdit ? `<button class="btn btn-sm btn-ghost" onclick="openEditReport(${r.id})">Edit</button>` : '—';
    return `<tr>
      <td style="font-weight:600;min-width:160px">${school.name||'—'}</td>
      <td style="font-size:.78rem">${sub.name||'—'}</td>
      <td style="font-size:.78rem">${r._monthLabel||''}</td>
      <td>${r.students_school||0}</td>
      <td>${r.students_community||0}</td>
      <td>${r.students_girls||0}</td>
      <td>${r.workshops_count||0}</td>
      <td>${r.mentoring_sessions||0}</td>
      <td>${r.innovation_projects||0}</td>
      <td>${r.atl_competitions_won||0}</td>
      <td>${r.other_competitions_won||0}</td>
      <td>${status}</td>
      <td>${editBtn}</td>
    </tr>`;
  }).join('');

  // Footer totals
  const footer = document.getElementById('reportFooter');
  if (footer) {
    const s = f => rows.reduce((a,r) => a+(r[f]||0), 0);
    footer.innerHTML = `<td><strong>TOTALS</strong></td><td></td><td></td>
      <td>${s('students_school')}</td><td>${s('students_community')}</td><td>${s('students_girls')}</td>
      <td>${s('workshops_count')}</td><td>${s('mentoring_sessions')}</td><td>${s('innovation_projects')}</td>
      <td>${s('atl_competitions_won')}</td><td>${s('other_competitions_won')}</td><td></td><td></td>`;
  }
}

function filterReportTable(q) {
  const rows = (STATE._reportRows||[]).filter(r => {
    const name = (r._school||{}).name || '';
    return name.toLowerCase().includes(q.toLowerCase());
  });
  drawTableRows(rows);
}

async function openEditReport(id) {
  STATE._editingReportId = id;
  try {
    const r = await api(`/api/reports/${id}`);
    document.getElementById('editReportTitle').textContent = `Edit Report — ${r.school_name}`;
    document.getElementById('editReportInfo').textContent = `${MONTHS[r.report_month]} ${r.report_year} · ${r.academic_year}`;

    const fields = ['students_school','students_community','students_girls','workshops_count',
      'mentoring_sessions','innovation_projects','patents_filed','copyrights_filed',
      'atl_competitions_won','other_competitions_won','highlight_of_month'];
    fields.forEach(f => {
      const el = document.getElementById('er_'+f);
      if (el) el.value = r[f] ?? '';
    });
    openModal('editReportModal');
  } catch(e) { toast(e.message, 'error'); }
}

async function saveReport() {
  const id = STATE._editingReportId;
  const body = {};
  ['students_school','students_community','students_girls','workshops_count','mentoring_sessions',
   'innovation_projects','patents_filed','copyrights_filed','atl_competitions_won','other_competitions_won'].forEach(f => {
    const v = document.getElementById('er_'+f).value;
    if (v !== '') body[f] = parseInt(v);
  });
  body.highlight_of_month = document.getElementById('er_highlight_of_month').value || null;

  try {
    await api(`/api/reports/${id}`, { method:'PUT', body: JSON.stringify(body) });
    toast('Report updated', 'success');
    closeModal('editReportModal');
    STATE._allReports = null;
    navigate('reports');
  } catch(e) { toast(e.message, 'error'); }
}

async function loadAnalytics() {
  try {
    if (!STATE._allReports) await loadReportData();
    const reports = STATE._allReports;

    const allMonths = academicMonths(reports);
    const trendLabels = allMonths.map(m => MONTHS[m.month].slice(0,3)+' '+String(m.year).slice(2));
    const trendStudents = allMonths.map(({year,month}) =>
      reports.filter(r => r.report_year===year && r.report_month===month).reduce((a,r) => a+(r.students_school||0)+(r.students_community||0),0));
    const trendWorkshops = allMonths.map(({year,month}) =>
      reports.filter(r => r.report_year===year && r.report_month===month).reduce((a,r) => a+(r.workshops_count||0),0));

    // KPI
    const latest = getLatestMonthReports(reports);
    const submitted = reports.filter(r => r.status==='submitted').length;
    const girlStudents = latest.reduce((a,r) => a+(r.students_girls||0),0);
    document.getElementById('analyticsKpi').innerHTML = [
      {label:'Total Reports', value: reports.length, icon:'<i class="ti ti-clipboard-list"></i>'},
      {label:'Submitted', value: submitted, icon:'<i class="ti ti-circle-check"></i>'},
      {label:'Schools Active', value: STATE._allSchools.length, icon:'<i class="ti ti-building"></i>'},
      {label:'Girl Students', value: girlStudents.toLocaleString(), icon:'<i class="ti ti-user"></i>'},
    ].map(k => `<div class="kpi-card"><div class="icon">${k.icon}</div><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`).join('');

    // Charts
    const trendCtx = document.getElementById('anTrendChart');
    if (trendCtx) STATE._charts.anTrend = new Chart(trendCtx, {
      type:'line',
      data:{ labels:trendLabels, datasets:[{ label:'Students', data:trendStudents, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.1)', tension:.4, fill:true }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
    });

    const wsCtx = document.getElementById('anWorkshopChart');
    if (wsCtx) STATE._charts.anWorkshop = new Chart(wsCtx, {
      type:'bar',
      data:{ labels:trendLabels, datasets:[{ label:'Workshops', data:trendWorkshops, backgroundColor:'#16a34a99', borderColor:'#16a34a', borderWidth:1, borderRadius:4 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
    });

    // Top schools by students
    const schoolSummary = STATE._allSchools.map(sc => {
      const rs = latest.filter(r => r.school_id===sc.id);
      return { name: sc.name, students: rs.reduce((a,r) => a+(r.students_school||0)+(r.students_community||0),0), projects: rs.reduce((a,r) => a+(r.innovation_projects||0),0) };
    });

    document.getElementById('anTopStudentsTb').innerHTML = [...schoolSummary].sort((a,b) => b.students-a.students).slice(0,5).map((s,i) =>
      `<tr><td>${i+1}</td><td>${s.name}</td><td><strong>${s.students.toLocaleString()}</strong></td></tr>`).join('');
    document.getElementById('anTopProjectsTb').innerHTML = [...schoolSummary].sort((a,b) => b.projects-a.projects).slice(0,5).map((s,i) =>
      `<tr><td>${i+1}</td><td>${s.name}</td><td><strong>${s.projects}</strong></td></tr>`).join('');

  } catch(e) { toast(e.message, 'error'); }
}

    const matchQ = !q || s.name.toLowerCase().includes(q) || (s.udise_code||'').includes(q) || (s.atl_lab_code||'').includes(q);

function getLatestMonthReports(reports) {
  // Find latest {year, month} combo
  if (!reports.length) return [];
  const sorted = [...reports].sort((a,b) => b.report_year*100+b.report_month - (a.report_year*100+a.report_month));
  const latest = { year: sorted[0].report_year, month: sorted[0].report_month };
  return reports.filter(r => r.report_year===latest.year && r.report_month===latest.month);
}

// ── Spinning gears on login left panel ───────────────────────────────────────
(function initGears(){
  const bg = document.getElementById('cubes-bg');
  if(!bg) return;

  function gearPoints(n, outerR, innerR){
    const pts = [];
    const total = n * 4;
    for(let i=0;i<total;i++){
      const a = (i/total)*Math.PI*2 - Math.PI/2;
      const r = (i%4<2) ? outerR : innerR;
      pts.push(+(r*Math.cos(a)).toFixed(1)+','+ +(r*Math.sin(a)).toFixed(1));
    }
    return pts.join(' ');
  }

  const configs = [
    {x:'12%', y:'18%', r:62, teeth:12, dur:'10s',  rev:false},
    {x:'31%', y:'14%', r:36, teeth:8,  dur:'5.8s', rev:true},
    {x:'72%', y:'9%',  r:50, teeth:10, dur:'12s',  rev:false},
    {x:'9%',  y:'63%', r:45, teeth:9,  dur:'8.5s', rev:true},
    {x:'60%', y:'70%', r:72, teeth:14, dur:'14s',  rev:false},
    {x:'84%', y:'50%', r:30, teeth:7,  dur:'5s',   rev:true},
    {x:'44%', y:'84%', r:40, teeth:8,  dur:'11s',  rev:false},
    {x:'87%', y:'83%', r:26, teeth:6,  dur:'6.5s', rev:true},
    {x:'55%', y:'35%', r:20, teeth:5,  dur:'4s',   rev:false},
  ];

  const st = 'rgba(255,255,255,.22)';
  const fill = 'rgba(255,255,255,.05)';

  bg.innerHTML = configs.map(g => {
    const oR = g.r, iR = Math.round(g.r*0.72), hR = Math.round(g.r*0.22);
    const sz = g.r*2+10;
    const pts = gearPoints(g.teeth, oR, iR);
    const anim = g.rev ? 'spinGearRev' : 'spinGear';
    return `<div class="gear-wrap" style="left:${g.x};top:${g.y};width:${sz}px;height:${sz}px;animation:${anim} ${g.dur} linear infinite;transform:translate(-50%,-50%)">
      <svg viewBox="${-oR-5} ${-oR-5} ${sz} ${sz}" width="${sz}" height="${sz}">
        <polygon points="${pts}" fill="${fill}" stroke="${st}" stroke-width="1.5" stroke-linejoin="round"/>
        <circle r="${hR}" fill="rgba(255,255,255,.08)" stroke="${st}" stroke-width="1.5"/>
        <circle r="${Math.round(hR*0.4)}" fill="${st}"/>
      </svg>
    </div>`;
  }).join('');
})();

function applyTheme(t){
  document.documentElement.dataset.theme = t;
  const icon = document.getElementById('theme-icon');
  if(icon) icon.className = t==='dark' ? 'ti ti-sun' : 'ti ti-moon';
}
function toggleTheme(){
  const cur = document.documentElement.dataset.theme || 'light';
  const next = cur==='dark' ? 'light' : 'dark';
  localStorage.setItem('gttc_theme', next);
  applyTheme(next);
}

// ════ NOTIFICATIONS ══════════════════════════════════════════════════════════
async function refreshMtNotifBadge() {
  try {
    const data = await api('/api/admin/notifications');
    const badge = document.getElementById('notif-badge');
    const dot   = document.getElementById('nav-notif-dot');
    if (data && data.unread > 0) {
      if (badge) { badge.textContent = data.unread > 9 ? '9+' : data.unread; badge.style.display = ''; }
      if (dot) dot.style.display = '';
    } else {
      if (badge) badge.style.display = 'none';
      if (dot) dot.style.display = 'none';
    }
  } catch(_) {}
}

async function markMtNotifRead(id, card) {
  try {
    await api(`/api/admin/notifications/${id}/read`, {method:'PATCH'});
    if (card) {
      card.style.borderColor = 'var(--border)';
      const dot = card.querySelector('.notif-dot');
      if (dot) dot.style.background = 'var(--border)';
    }
    refreshMtNotifBadge();
  } catch(_) {}
}

async function markAllMtNotifRead() {
  try {
    await api('/api/admin/notifications/read-all', {method:'PATCH'});
    document.querySelectorAll('[data-notif-id]').forEach(card => {
      card.style.borderColor = 'var(--border)';
      const dot = card.querySelector('.notif-dot');
      if (dot) dot.style.background = 'var(--border)';
    });
    refreshMtNotifBadge();
    toast('All notifications marked as read', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function loadMtNotifList() {
  const el = document.getElementById('notif-list');
  if (!el) return;
  const TYPE_ICON = { pending_report:'ti-clock-exclamation', report_reviewed:'ti-circle-check', competition_added:'ti-trophy', reminder_sent:'ti-send' };
  const TYPE_COLOR = { pending_report:'var(--amber)', report_reviewed:'var(--green)', competition_added:'var(--blue)', reminder_sent:'var(--purple)' };
  try {
    const data = await api('/api/admin/notifications');
    if (!data || !data.items || !data.items.length) {
      el.innerHTML = '<div style="padding:48px;text-align:center;opacity:.4;font-size:15px">No notifications yet</div>';
      return;
    }
    el.innerHTML = data.items.map(n => {
      const color = TYPE_COLOR[n.notif_type] || 'var(--text3)';
      const icon  = TYPE_ICON[n.notif_type]  || 'ti-bell';
      const when  = n.created_at ? new Date(n.created_at).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}) : '';
      const border = n.is_read ? 'var(--border)' : color;
      return `<div data-notif-id="${n.id}" style="display:flex;gap:12px;padding:14px 16px;border-radius:10px;background:var(--surface);border:1.5px solid ${border};align-items:flex-start;cursor:pointer;transition:border-color .2s"
        onclick="markMtNotifRead(${n.id},this)">
        <div class="notif-dot" style="width:9px;height:9px;border-radius:50%;background:${n.is_read?'var(--border)':color};flex-shrink:0;margin-top:5px;transition:background .2s"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;margin-bottom:2px">${n.title}</div>
          <div style="color:var(--text3);font-size:13px;line-height:1.4">${n.body||''}</div>
          <div style="color:var(--text3);font-size:11px;margin-top:6px;opacity:.7"><i class="ti ${icon}"></i> ${when}</div>
        </div>
      </div>`;
    }).join('');
    refreshMtNotifBadge();
  } catch(e) { el.innerHTML = `<div style="padding:16px;color:#dc2626;text-align:center">${e.message}</div>`; }
}

async function mtLoadLeaderboard() {
  const year   = document.getElementById('mt-lb-year')?.value || STATE.currentAcademicYear || '2025-26';
  const tbody  = document.getElementById('mt-lb-tbody');
  const meta   = document.getElementById('mt-lb-meta');
  if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="padding:24px;text-align:center;opacity:.4">Loading…</td></tr>';
  const tok = localStorage.getItem('gttc_mt_token') || localStorage.getItem('gttc_token');
  try {
    const resp = await fetch(`/api/analytics/leaderboard?academic_year=${year}&metric=${_mtLbMetric}&limit=30`,
      { headers:{ Authorization:'Bearer '+tok } });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    if (!data || !data.schools) return;
    const schools = data.schools;
    if (meta) meta.textContent = `${schools.length} schools`;
    if (!schools.length) { tbody.innerHTML = '<tr><td colspan="5" style="padding:32px;text-align:center;opacity:.4">No data</td></tr>'; return; }
    const MEDALS = ['🥇','🥈','🥉'];
    tbody.innerHTML = schools.map(s => {
      const trophy = s.rank <= 3 ? MEDALS[s.rank-1] : '';
      const chg = s.is_new ? '<span style="font-size:11px;background:rgba(37,99,235,.1);color:var(--blue);border-radius:5px;padding:2px 6px;font-weight:700">NEW</span>'
        : s.rank_change===null ? '—'
        : s.rank_change > 0 ? `<span style="color:#16a34a;font-weight:700">↑${s.rank_change}</span>`
        : s.rank_change < 0 ? `<span style="color:#dc2626;font-weight:700">↓${Math.abs(s.rank_change)}</span>`
        : '—';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:12px 16px;text-align:center;font-size:18px;font-weight:800;opacity:.6">${trophy||s.rank}</td>
        <td style="padding:12px 16px;font-weight:600">${s.school_name}</td>
        <td style="padding:12px 16px;opacity:.5;font-size:13px">${s.district}</td>
        <td style="padding:12px 16px;text-align:right;font-size:18px;font-weight:800;color:${_mtLbColor}">${s.total.toLocaleString()}</td>
        <td style="padding:12px 16px;text-align:right">${chg}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="padding:16px;color:red;text-align:center">${e.message}</td></tr>`;
  }
}

async function loadMtCalendar() {
  const monthEl = document.getElementById('mt-cal-month');
  const yearEl  = document.getElementById('mt-cal-year');
  if (!monthEl || !yearEl) return;
  const month = parseInt(monthEl.value);
  const year  = parseInt(yearEl.value);
  const gridEl  = document.getElementById('mt-cal-grid');
  const listEl  = document.getElementById('mt-cal-events-list');
  const MNAMES  = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  try {
    const events = await api(`/api/admin/calendar-events?year=${year}&month=${month}`);
    const firstDay = new Date(year, month-1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();
    const eventsByDay = {};
    (events||[]).forEach(e => {
      const d = parseInt(e.event_date.split('-')[2]);
      if (!eventsByDay[d]) eventsByDay[d] = [];
      eventsByDay[d].push(e);
    });
    let cells = '';
    dayNames.forEach(d => { cells += `<div style="text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.5px">${d}</div>`; });
    for (let i=0; i<firstDay; i++) cells += '<div></div>';
    for (let d=1; d<=daysInMonth; d++) {
      const today = new Date(); const isToday = d===today.getDate() && month===today.getMonth()+1 && year===today.getFullYear();
      const dayEvs = eventsByDay[d] || [];
      const dots = dayEvs.map(e=>`<div style="width:5px;height:5px;border-radius:50%;background:var(--${MT_EVENT_TYPE_COLOR[e.event_type]||'purple'});flex-shrink:0"></div>`).join('');
      cells += `<div style="min-height:52px;padding:4px;border-radius:6px;background:${isToday?'var(--blue-bg)':'transparent'};border:1px solid ${isToday?'var(--blue)':'transparent'}">
        <div style="font-size:13px;font-weight:${isToday?700:500};color:${isToday?'var(--blue)':'var(--text)'}">${d}</div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px">${dots}</div>
      </div>`;
    }
    if (gridEl) {
      gridEl.innerHTML = `
        <div style="text-align:center;font-size:16px;font-weight:700;margin-bottom:12px">${MNAMES[month]} ${year}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
    }
    if (listEl) {
      if (!events || !events.length) {
        listEl.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3)">No events this month.</div>';
      } else {
        listEl.innerHTML = events.map(e => {
          const color = MT_EVENT_TYPE_COLOR[e.event_type] || 'purple';
          const dateStr = new Date(e.event_date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
          const endStr  = e.end_date ? ` → ${new Date(e.end_date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}` : '';
          return `<div style="display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="width:40px;height:40px;border-radius:8px;background:rgba(100,100,200,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:var(--${color},#6366f1);text-transform:uppercase">${e.event_type}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:14px">${e.title}</div>
              <div style="font-size:12px;color:var(--text2);margin-top:2px">${dateStr}${endStr}</div>
              ${e.description ? `<div style="font-size:12px;color:var(--text3);margin-top:4px">${e.description}</div>` : ''}
            </div>
            <button onclick="deleteMtCalEvent(${e.id})" style="padding:4px 8px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--red,#dc2626)">Delete</button>
          </div>`;
        }).join('');
      }
    }
  } catch(e) {
    if (gridEl) gridEl.innerHTML = `<div style="padding:16px;color:var(--red,#dc2626)">${e.message}</div>`;
  }
}

async function saveMtCalEvent(btn) {
  const title   = document.getElementById('mt-ev-title')?.value.trim();
  const evDate  = document.getElementById('mt-ev-date')?.value;
  const endDate = document.getElementById('mt-ev-end')?.value;
  const evType  = document.getElementById('mt-ev-type')?.value;
  const desc    = document.getElementById('mt-ev-desc')?.value.trim();
  if (!title || !evDate) { toast('Title and date are required', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await api('/api/admin/calendar-events', {method:'POST', body:JSON.stringify({title, event_date:evDate, end_date:endDate||null, event_type:evType, description:desc, is_all_divisions:true})});
    document.getElementById('mt-event-overlay')?.remove();
    toast('Event added!', 'success');
    loadMtCalendar();
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'Save Event';
  }
}

async function deleteMtCalEvent(id) {
  if (!confirm('Delete this event?')) return;
  try {
    await api(`/api/admin/calendar-events/${id}`, {method:'DELETE'});
    toast('Event deleted', 'success');
    loadMtCalendar();
  } catch(e) { toast(e.message, 'error'); }
}

<script>
/* ═══ PREMIUM INTERACTIONS — 3D Tilt · Ripple · Stagger ═══ */
(function(){
  'use strict';
  var _cur=null;
  document.addEventListener('mousemove',function(e){
    var c=e.target.closest&&e.target.closest('.card,.stat,.kpi,.kpi-card');
    if(!c){if(_cur){_cur.style.transform='';_cur=null;}return;}
    if(_cur&&_cur!==c)_cur.style.transform='';
    _cur=c;
    var r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
    c.style.transform='perspective(800px) rotateY('+(x*8)+'deg) rotateX('+(-y*6)+'deg) translateZ(8px)';
  },{passive:true});
  document.addEventListener('mouseleave',function(e){
    var t=e.target;
    if(t&&t.matches&&t.matches('.card,.stat,.kpi,.kpi-card')){t.style.transform='';_cur=null;}
  },true);
  document.addEventListener('click',function(e){
    var btn=e.target.closest&&e.target.closest('button:not([disabled])');
    if(!btn)return;
    var rp=document.createElement('span'),r=btn.getBoundingClientRect(),sz=Math.max(r.width,r.height)*1.6;
    Object.assign(rp.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',background:'rgba(255,255,255,.35)',left:(e.clientX-r.left-sz/2)+'px',top:(e.clientY-r.top-sz/2)+'px',transform:'scale(0)',animation:'ripple .55s ease-out forwards',pointerEvents:'none',zIndex:'9'});
    if(getComputedStyle(btn).position==='static')btn.style.position='relative';
    btn.style.overflow='hidden';btn.appendChild(rp);setTimeout(function(){rp.remove();},600);
  });
  try{
    var obs=new MutationObserver(function(ms){
      ms.forEach(function(m){
        m.addedNodes.forEach(function(n){
          if(n.nodeType!==1)return;
          var sel='.card,.stat,.kpi,.kpi-card',cards=(n.matches&&n.matches(sel))?[n]:Array.from(n.querySelectorAll(sel));
          cards.forEach(function(c,i){c.classList.remove('stagger-in');void c.offsetWidth;c.style.animationDelay=(i*60)+'ms';c.classList.add('stagger-in');});
        });
      });
    });
    obs.observe(document.body,{childList:true,subtree:true});
  }catch(e){}
})();
</script>

function _mtMapStyle() {
  return {
    version:8,
    sources:{ osm:{ type:'raster', tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize:256, attribution:'© OpenStreetMap' } },
    layers:[{ id:'osm', type:'raster', source:'osm' }]
  };
}
function _mtCircleGeoJSON(clng, clat, rm, pts=64) {
  const c=[];
  for(let i=0;i<=pts;i++){
    const a=(i/pts)*2*Math.PI;
    const dy=(rm/111320)/Math.cos(clat*Math.PI/180);
    const dx=rm/111320;
    c.push([clng+dy*Math.cos(a), clat+dx*Math.sin(a)]);
  }
  return {type:'Feature',geometry:{type:'Polygon',coordinates:[c]}};
}

async function loadMtAttendance() {
  const tbody  = document.getElementById('mt-att-tbody');
  const footer = document.getElementById('mt-att-footer');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">Loading…</td></tr>';

  const from  = document.getElementById('mt-att-from')?.value || '';
  const to    = document.getElementById('mt-att-to')?.value   || '';
  const fence = document.getElementById('mt-att-fence')?.value;

  let url = '/api/attendance/records?limit=200';
  if (from)  url += '&from_date=' + from;
  if (to)    url += '&to_date='   + to;
  if (fence !== '' && fence !== undefined) url += '&in_geofence=' + fence;

  try {
    const records = await api(url);
    if (!records.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">No records found</td></tr>';
      return;
    }
    let valid = 0;
    tbody.innerHTML = records.map(r => {
      const cin  = r.check_in_at  ? new Date(r.check_in_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})  : '—';
      const cout = r.check_out_at ? new Date(r.check_out_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '—';
      const dist = r.check_in_dist !== null ? r.check_in_dist+'m' : '—';
      const badge = r.in_geofence
        ? '<span style="background:#dcfce7;color:#14532d;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600">Valid</span>'
        : '<span style="background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600">Out of Range</span>';
      if (r.in_geofence) valid++;
      const d = new Date(r.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      const hasLoc = r.check_in_lat !== null;
      return `<tr style="border-top:1px solid var(--line2)">
        <td style="padding:9px 14px;font-weight:500">${d}</td>
        <td style="padding:9px 14px">${r.user_name||'—'}</td>
        <td style="padding:9px 14px;font-size:.8rem;color:var(--text3)">${r.school_name||'—'}</td>
        <td style="padding:9px 14px;color:#2563eb">${cin}</td>
        <td style="padding:9px 14px;color:#16a34a">${cout}</td>
        <td style="padding:9px 14px">${dist}</td>
        <td style="padding:9px 14px">${badge}</td>
        <td style="padding:9px 14px">${hasLoc?`<button onclick='viewMtAttendanceLocation(${JSON.stringify(r)})' style="background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;color:var(--text1)">Map</button>`:''}</td>
      </tr>`;
    }).join('');
    if (footer) footer.textContent = `${records.length} records · ${valid} valid`;
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">${e.message}</td></tr>`;
  }
}

function viewMtAttendanceLocation(r) {

  setTimeout(() => {
    const sLat=r.school_lat, sLng=r.school_lng;

    map.on('load', () => {
      if (sLat && sLng) {
        const rad = r.school_radius||200;
        map.addSource('gc',{type:'geojson',data:_mtCircleGeoJSON(sLng,sLat,rad)});
        map.addLayer({id:'gf',type:'fill',source:'gc',paint:{'fill-color':'#2563eb','fill-opacity':0.12}});
        map.addLayer({id:'gb',type:'line',source:'gc',paint:{'line-color':'#2563eb','line-width':2}});

        new maplibregl.Marker({color:r.in_geofence?'#16a34a':'#d97706'}).setLngLat([r.check_in_lng,r.check_in_lat]).addTo(map);
      if (r.check_out_lat&&r.check_out_lng)
        new maplibregl.Marker({color:'#9333ea'}).setLngLat([r.check_out_lng,r.check_out_lat]).addTo(map);
    });
