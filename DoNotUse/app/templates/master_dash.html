async function loadMtLeaves() {
  const tbody = document.getElementById('mt-lv-tbody');
  if (!tbody) return;
  tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)" class="pulse">Loading…</td></tr>`;

  const mv       = document.getElementById('mt-lv-month')?.value;
  const schoolId = document.getElementById('mt-lv-school')?.value;
  const status   = document.getElementById('mt-lv-status')?.value;

  const params = new URLSearchParams();
  if (status)   params.append('status',    status);
  if (schoolId) params.append('school_id', schoolId);
  if (mv) {
    const [y, m] = mv.split('-');
    params.append('year', y);
    params.append('month', m);
  }

  try {
    const rows = await api('/api/leave/list?' + params.toString());
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">No leave requests found</td></tr>';
      return;
    }

    const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const sb = { pending:'#fef3c7|#92400e', approved:'#dcfce7|#14532d', rejected:'#fee2e2|#991b1b' };

    // Group by month (from_date)
    const byMonth = {};
    rows.forEach(r => {
      const key = r.from_date.slice(0,7);
      (byMonth[key] = byMonth[key] || []).push(r);
    });

    let html = '';
    for (const [ym, group] of Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0]))) {
      const [yy, mm] = ym.split('-').map(Number);
      html += `<tr style="background:var(--line2)">
        <td colspan="8" style="padding:6px 14px;font-size:.71rem;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase">
          ${MONTHS[mm]} ${yy} — ${group.length} request${group.length!==1?'s':''}
        </td></tr>`;
      html += group.map(r => {
        const [bg, fg] = (sb[r.status]||'#f3f4f6|#374151').split('|');
        const f = new Date(r.from_date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        const t = new Date(r.to_date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        const rMo = new Date(r.from_date+'T00:00:00');
        const rMonth = MONTHS[rMo.getMonth()+1] + ' ' + rMo.getFullYear();
        const act = r.status==='pending'
          ? `<div style="display:flex;gap:4px">
               <button onclick="reviewLeave(${r.id},'approve')" style="${BTN};background:#16a34a;color:#fff;padding:4px 10px;font-size:.73rem">Approve</button>
               <button onclick="reviewLeave(${r.id},'reject')"  style="${BTN};background:#dc2626;color:#fff;padding:4px 10px;font-size:.73rem">Reject</button>
             </div>`
          : `<span style="color:var(--text3);font-size:.75rem">${r.reviewed_by||'—'}</span>`;
        return `<tr style="border-top:1px solid var(--line2)">
          <td style="padding:9px 14px;font-weight:500">${r.user_name||'—'}</td>
          <td style="padding:9px 14px;font-size:.78rem;color:var(--text3)">${r.school_name||'—'}</td>
          <td style="padding:9px 14px;font-size:.78rem;color:var(--text3)">${rMonth}</td>
          <td style="padding:9px 14px;white-space:nowrap">${f} – ${t}</td>
          <td style="padding:9px 14px">${r.days}</td>
          <td style="padding:9px 14px;color:var(--text3);max-width:180px;font-size:.8rem">${r.reason||'—'}</td>
          <td style="padding:9px 14px"><span style="background:${bg};color:${fg};padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600;text-transform:capitalize">${r.status}</span></td>
          <td style="padding:9px 14px;white-space:nowrap">${act}</td>
        </tr>`;
      }).join('');
    }
    tbody.innerHTML = html;
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">${e.message}</td></tr>`;
  }
}

async function reviewLeave(id, action) {
  let note = '';
  if (action === 'reject') {
    note = prompt('Reason for rejection (optional):') ?? '';
    if (note === null) return;
  }
  try {
    await api('/api/leave/' + id + '/review', { method:'PATCH', body: JSON.stringify({ action, note }) });
    toast('Leave ' + action + 'd', 'success');
    loadMtLeaves();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Holiday calendar ──────────────────────────────────────────────────────────
function shiftMtHolYear(delta) {
  _mtHolYear += delta;
  const lbl = document.getElementById('mt-hol-year-lbl');
  if (lbl) lbl.textContent = _mtHolYear;
  loadMtHolidays();
}

async function loadMtHolidays() {
  const box = document.getElementById('mt-hol-cal');
  if (!box) return;
  box.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3)" class="pulse">Loading…</div>';
  try {
    const rows = await api('/api/leave/holidays?year=' + _mtHolYear);
    box.innerHTML = _buildMtHolCal(_mtHolYear, rows || []);
  } catch(e) {
    box.innerHTML = `<div style="padding:18px;text-align:center;color:#dc2626">${e.message}</div>`;
  }
}

function _buildMtHolCal(year, holidays) {
  const MN  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const today = new Date().toISOString().slice(0,10);

  const hMap = {};
  (holidays || []).forEach(h => { hMap[h.date] = h; });

  if (!holidays.length) {
    return `<div style="padding:32px;text-align:center;color:var(--text3)">No holidays added for ${year}. Use the form above to add holidays.</div>`;
  }

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px">';

  for (let m = 0; m < 12; m++) {
    const daysInMonth = new Date(year, m+1, 0).getDate();
    const startDow    = new Date(year, m, 1).getDay();
    const monthHols   = Object.keys(hMap).filter(d => d.startsWith(`${year}-${String(m+1).padStart(2,'0')}-`));

    html += `<div style="border:1px solid var(--border2);border-radius:10px;overflow:hidden;background:var(--ink2)">
      <div style="padding:7px 12px;background:var(--line2);display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:600;font-size:.78rem;color:var(--text1)">${MN[m]} ${year}</span>
        ${monthHols.length ? `<span style="background:#f59e0b;color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px">${monthHols.length}</span>` : ''}
      </div>
      <div style="padding:6px 8px">
        <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px">
          ${DOW.map(d=>`<div style="text-align:center;font-size:9px;color:var(--text3);font-weight:600;padding:2px 0">${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">
          ${Array(startDow).fill('<div></div>').join('')}
          ${Array.from({length:daysInMonth},(_,i) => {
            const day = i+1;
            const ds  = `${year}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const h   = hMap[ds];
            const dow = new Date(year,m,day).getDay();
            const isToday = ds === today;

            if (h) {
              const eName = h.name.replace(/'/g,"\\'");
              const eDiv  = h.division_name.replace(/'/g,"\\'");
              return `<div title="${h.name} · ${h.division_name}" style="display:flex;align-items:center;justify-content:center;cursor:pointer"
                onclick="openMtEditHoliday(${h.id},'${eName}','${h.date}','${eDiv}')">
                <div style="background:#f59e0b;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${day}</div>
              </div>`;
            } else if (isToday) {
              return `<div style="display:flex;align-items:center;justify-content:center">
                <div style="background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${day}</div>
              </div>`;
            } else {
              return `<div style="text-align:center;font-size:10px;color:${dow===0?'#dc2626':'var(--text2)'};line-height:22px">${day}</div>`;
            }
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  html += '</div>';
  html += `<div style="display:flex;align-items:center;gap:16px;margin-top:14px;font-size:.75rem;color:var(--text3)">
    <span style="display:flex;align-items:center;gap:4px"><span style="background:#f59e0b;border-radius:50%;width:13px;height:13px;display:inline-block"></span> Holiday (click to edit/delete)</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="background:var(--blue);border-radius:50%;width:13px;height:13px;display:inline-block"></span> Today</span>
    <span style="color:#dc2626;font-weight:600">Su</span> = Sundays
  </div>`;
  return html;
}

function openMtEditHoliday(id, name, dateVal, divName) {
  // Use a simple inline modal overlay (master_dash has no openModal helper by default)
  const overlay = document.createElement('div');
  overlay.id = 'mt-hol-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML = `
    <div style="background:var(--surface,#fff);border-radius:14px;padding:24px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-weight:700;font-size:1rem;color:var(--text1)">Edit Holiday</div>
        <button onclick="closeMtHolModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text3);line-height:1">&times;</button>
      </div>
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1e40af;margin-bottom:14px">Division: <strong>${divName}</strong></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div>
          <label style="font-size:.77rem;color:var(--text3);font-weight:600;display:block;margin-bottom:4px">Holiday Name</label>
          <input id="mt-eh-name" value="${name.replace(/"/g,'&quot;')}" style="${INP};width:100%;box-sizing:border-box">
        </div>
        <div>
          <label style="font-size:.77rem;color:var(--text3);font-weight:600;display:block;margin-bottom:4px">Date</label>
          <input id="mt-eh-date" type="date" value="${dateVal}" style="${INP};width:100%;box-sizing:border-box">
        </div>
      </div>
      <div id="mt-eh-err" style="display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#991b1b;margin-bottom:10px"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button onclick="delMtHoliday(${id},true)" style="${BTN};background:#dc2626;color:#fff">
          Delete
        </button>
        <div style="display:flex;gap:8px">
          <button onclick="closeMtHolModal()" style="${BTN};background:var(--ink2);color:var(--text1)">Cancel</button>
          <button id="mt-eh-btn" onclick="saveMtEditHoliday(${id})" style="${BTN};background:var(--blue);color:#fff">Save Changes</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target===overlay) closeMtHolModal(); });
}

function closeMtHolModal() {
  document.getElementById('mt-hol-modal')?.remove();
}

async function saveMtEditHoliday(id) {
  const btn   = document.getElementById('mt-eh-btn');
  const errEl = document.getElementById('mt-eh-err');
  const name  = document.getElementById('mt-eh-name')?.value.trim();
  const date  = document.getElementById('mt-eh-date')?.value;
  if (!name || !date) {
    if (errEl) { errEl.textContent='Name and date are required'; errEl.style.display='block'; }
    return;
  }
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  try {
    await api(`/api/leave/holidays/${id}`, { method:'PATCH', body: JSON.stringify({ name, date }) });
    closeMtHolModal();
    toast('Holiday updated', 'success');
    loadMtHolidays();
  } catch(e) {
    if (errEl) { errEl.textContent=e.message; errEl.style.display='block'; }
    if (btn) { btn.disabled=false; btn.textContent='Save Changes'; }
  }
}

async function addMtHoliday() {
  const dateVal = document.getElementById('mt-hol-date')?.value;
  const name    = document.getElementById('mt-hol-name')?.value.trim();
  if (!dateVal || !name) { toast('Enter date and holiday name', 'error'); return; }
  try {
    await api('/api/leave/holidays', { method:'POST', body: JSON.stringify({ date: dateVal, name }) });
    toast('Holiday added', 'success');
    document.getElementById('mt-hol-name').value = '';
    document.getElementById('mt-hol-date').value = '';
    const addedYear = parseInt(dateVal.slice(0,4));
    if (addedYear && addedYear !== _mtHolYear) {
      _mtHolYear = addedYear;
      const lbl = document.getElementById('mt-hol-year-lbl');
      if (lbl) lbl.textContent = _mtHolYear;
    }
    loadMtHolidays();
  } catch(e) { toast(e.message, 'error'); }
}

async function delMtHoliday(id, fromModal=false) {
  if (!confirm('Delete this holiday?')) return;
  try {
    await api('/api/leave/holidays/' + id, { method:'DELETE' });
    toast('Holiday deleted', 'success');
    if (fromModal) closeMtHolModal();
    loadMtHolidays();
  } catch(e) { toast(e.message, 'error'); }
}
</script>
